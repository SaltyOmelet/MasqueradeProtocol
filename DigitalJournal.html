<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Memory Reconstruction Demo v3</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
color:white;
background:linear-gradient(135deg,#4f46e5,#9333ea,#ec4899,#f59e0b);
min-height:100vh;
}
canvas{
background:rgba(255,255,255,.08);
border-radius:14px;
margin-top:10px;
}
#popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:25px;
border-radius:12px;
max-width:500px;
z-index:999;
}
button{padding:10px 20px;}
</style>
</head>
<body>

<h1>Adrian's Digital Journal</h1>
<h3 id="levelTitle">Memory Reconstruction - Level 1</h3>
<p>Rotate mirrors to guide the memory stream to the golden memory orb.</p>

<canvas id="board" width="600" height="600"></canvas>

<div id="popup">
<h2 id="popupTitle">Journal Entry Recovered</h2>
<p id="popupContent">Placeholder evidence.</p>
<button onclick="closePopup()">Continue</button>
</div>

<script>
const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");

let SIZE=6;
let CELL=100;

const source={x:0,y:0,dir:"right"};

const levels=[

{
 size:6,

 target:{x:5,y:5},

 mirrors:{
  "1,0":"slash",
  "1,2":"back",
  "3,2":"slash",
  "3,4":"back",
  "5,4":"slash",

  "0,4":"back",
  "2,5":"slash",
  "4,1":"back"
 },

 evidence:"GREEN EVIDENCE: Adrian wrote that Green Mask had become increasingly resentful of his success."
},

{
 size:8,

 target:{x:7,y:7},

 mirrors:{
  "1,0":"slash",
  "1,3":"back",
  "3,3":"slash",
  "3,6":"back",
  "5,6":"slash",
  "5,2":"back",
  "7,2":"slash",

  "2,1":"slash",
  "2,5":"back",
  "4,0":"slash",
  "6,4":"back",
  "6,7":"slash"
 },

 evidence:"WHITE EVIDENCE: Adrian suspected White Mask was actively attempting to stop the Continuum Protocol."
},

{
 size:10,

 target:{x:9,y:9},

 mirrors:{
  "1,0":"slash",
  "1,4":"back",
  "3,4":"slash",
  "3,8":"back",
  "5,8":"slash",
  "5,2":"back",
  "7,2":"slash",
  "7,7":"back",
  "9,7":"slash",

  "0,5":"slash",
  "2,1":"back",
  "2,9":"slash",
  "4,3":"back",
  "4,6":"slash",
  "6,0":"back",
  "6,9":"slash",
  "8,3":"back",
  "8,8":"slash"
 },

 evidence:"RED EVIDENCE: Adrian expressed regret over helping his closest friend hide the consequences of a terrible act."
}

];

let currentLevel=0;
let target={};
let mirrors={};
let solved=false;

function loadLevel(index){

 SIZE=levels[index].size;
 CELL=600/SIZE;

 target=levels[index].target;

 mirrors=JSON.parse(
  JSON.stringify(levels[index].mirrors)
 );

 solved=false;

 document.getElementById("levelTitle").innerText=
  "Memory Reconstruction - Level "+(index+1);

 draw();
}

function reflect(dir,type){

 if(type==="slash"){
  if(dir==="right") return "up";
  if(dir==="up") return "right";
  if(dir==="left") return "down";
  if(dir==="down") return "left";
 }

 if(type==="back"){
  if(dir==="right") return "down";
  if(dir==="down") return "right";
  if(dir==="left") return "up";
  if(dir==="up") return "left";
 }

 return dir;
}

function traceLaser(){

 let x=source.x;
 let y=source.y;
 let dir=source.dir;

 let pts=[[CELL/2,CELL/2]];
 let success=false;

 for(let i=0;i<200;i++){

  if(dir==="right") x++;
  else if(dir==="left") x--;
  else if(dir==="up") y--;
  else if(dir==="down") y++;

  if(x<0||x>=SIZE||y<0||y>=SIZE) break;

  pts.push([
  x*CELL+CELL/2,
  y*CELL+CELL/2
  ]);

  if(x===target.x && y===target.y){
    success=true;
    break;
  }

  const key=`${x},${y}`;

  if(mirrors[key]){
    dir=reflect(dir,mirrors[key]);
  }
 }

 return {pts,success};
}

function draw(){

 ctx.clearRect(
  0,
  0,
  canvas.width,
  canvas.height
 );

 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){

   ctx.strokeStyle="rgba(255,255,255,.25)";
   ctx.strokeRect(x*CELL,y*CELL,CELL,CELL);

   const key=`${x},${y}`;

   if(mirrors[key]){

    ctx.strokeStyle="white";
    ctx.lineWidth=5;

    ctx.beginPath();

    if(mirrors[key]==="slash"){
      ctx.moveTo(x*CELL+CELL,y*CELL);
      ctx.lineTo(x*CELL,y*CELL+CELL);
    }else{
      ctx.moveTo(x*CELL,y*CELL);
      ctx.lineTo(x*CELL+CELL,y*CELL+CELL);
    }

    ctx.stroke();
   }
  }
 }

 ctx.fillStyle="#22d3ee";
 ctx.beginPath();
 ctx.arc(
  CELL/2,
  CELL/2,
  Math.max(8,CELL*0.18),
  0,
  Math.PI*2
 );
 ctx.fill();

 ctx.fillStyle="#facc15";
 ctx.beginPath();
 ctx.arc(
  target.x*CELL+CELL/2,
  target.y*CELL+CELL/2,
  Math.max(10,CELL*0.22),
  0,
  Math.PI*2
 );
 ctx.fill();

 const laser=traceLaser();

 ctx.strokeStyle="#22d3ee";
 ctx.lineWidth=6;
 ctx.beginPath();

 laser.pts.forEach((p,i)=>{
   if(i===0) ctx.moveTo(p[0],p[1]);
   else ctx.lineTo(p[0],p[1]);
 });

 ctx.stroke();

 if(laser.success && !solved){
   solved=true;
   setTimeout(showEvidence,100);
 }
}

function showEvidence(){

 document.getElementById("popupTitle").innerText="Journal Entry Recovered";

 document.getElementById("popupContent").innerText=
  levels[currentLevel].evidence;

 document.getElementById("popup").style.display="block";
}

function closePopup(){

 document.getElementById("popup").style.display="none";

 currentLevel++;

 if(currentLevel<levels.length){
   loadLevel(currentLevel);
 }else{
   document.getElementById("popupTitle").innerText=
     "Journal Fully Restored";

   document.getElementById("popupContent").innerText=
     "All memory fragments recovered.";

   document.getElementById("popup").style.display="block";
 }
}

canvas.addEventListener("click",(e)=>{

 if(solved) return;

 const rect=canvas.getBoundingClientRect();

 const x=Math.floor((e.clientX-rect.left)/CELL);
 const y=Math.floor((e.clientY-rect.top)/CELL);

 const key=`${x},${y}`;

 if(mirrors[key]){
   mirrors[key]=mirrors[key]==="slash"?"back":"slash";
   draw();
 }
});

loadLevel(0);
</script>
</body>
</html>
