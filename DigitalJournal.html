<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Memory Reconstruction Demo v3</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
color:white;

background:linear-gradient(
 -45deg,
 #4f46e5,
 #9333ea,
 #ec4899,
 #f59e0b
);

background-size:400% 400%;

animation:bgShift 15s ease infinite;

min-height:100vh;
}
canvas{
background:rgba(255,255,255,.08);
border-radius:14px;
margin-top:10px;
}
#popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:25px;
border-radius:12px;
max-width:500px;
z-index:999;
}
button{padding:10px 20px;}
@keyframes bgShift{

 0%{
  background-position:0% 50%;
 }

 50%{
  background-position:100% 50%;
 }

 100%{
  background-position:0% 50%;
 }

}
@keyframes floatTitle{

 0%{
  transform:translateY(0px);
 }

 50%{
  transform:translateY(-8px);
 }

 100%{
  transform:translateY(0px);
 }

}

@keyframes glowTitle{

 0%{
  text-shadow:
   0 0 10px rgba(255,255,255,.3);
 }

 50%{
  text-shadow:
   0 0 30px rgba(255,255,255,.8);
 }

 100%{
  text-shadow:
   0 0 10px rgba(255,255,255,.3);
 }

}
#journalTitle{

 font-size:42px;

 text-shadow:
  0 0 15px rgba(255,255,255,.5);

 animation:
  floatTitle 4s ease-in-out infinite,
  glowTitle 3s ease-in-out infinite;
}
</style>
</head>
<body>

<h1 id="journalTitle">
Adrian's Digital Journal
</h1>
<h3 id="levelTitle">Memory Reconstruction - Level 1</h3>
<p>Rotate mirrors to guide the memory stream to the golden memory orb.</p>

<canvas id="board" width="600" height="600"></canvas>

<div id="popup">
<h2 id="popupTitle">Journal Entry Recovered</h2>
<p id="popupContent">Placeholder evidence.</p>
<button onclick="closePopup()">Continue</button>
</div>

<script>
const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
const particles=[];

for(let i=0;i<50;i++){

 particles.push({

  x:Math.random()*600,
  y:Math.random()*600,

  speed:0.2+Math.random()*0.6,

  size:1+Math.random()*3

 });

}
let SIZE=6;
let CELL=100;

const source={x:0,y:0,dir:"right"};

const levels=[

 {
  size:6,
  target:{x:4,y:4},
 
  mirrors:{
   "1,0":"back",
   "1,3":"slash",
   "4,3":"back",
 
   "0,4":"back",
   "2,2":"slash",
   "5,1":"back"
  },
 
  evidence:"GREEN EVIDENCE: Adrian wrote that Green Mask had become increasingly resentful of his success."
 },
 
 {
  size:8,
  target:{x:6,y:2},
 
  mirrors:{
   "1,0":"back",
   "1,5":"slash",
   "5,5":"slash",
   "5,2":"back",
 
   "2,1":"slash",
   "2,7":"back",
   "3,3":"slash",
   "4,0":"back",
   "6,6":"slash"
  },
 
  evidence:"WHITE EVIDENCE: Adrian suspected White Mask was actively attempting to stop the Continuum Protocol."
 },
 
 {
  size:10,
  target:{x:8,y:7},
 
  mirrors:{
   "1,0":"back",
   "1,8":"slash",
   "4,8":"slash",
   "4,2":"back",
   "8,2":"back",
 
   "0,6":"slash",
   "2,1":"back",
   "2,9":"slash",
   "3,4":"back",
   "5,5":"slash",
   "6,1":"back",
   "6,9":"slash",
   "7,4":"back",
   "9,5":"slash"
  },
 
  evidence:"RED EVIDENCE: Adrian expressed regret over helping his closest friend hide the consequences of a terrible act."
 }

];

let currentLevel=0;
let target={};
let mirrors={};
let solved=false;

function loadLevel(index){

 SIZE=levels[index].size;
 CELL=600/SIZE;

 target=levels[index].target;

 mirrors=JSON.parse(
  JSON.stringify(levels[index].mirrors)
 );

 solved=false;

 document.getElementById("levelTitle").innerText=
  "Memory Reconstruction - Level "+(index+1);

 draw();
}

function reflect(dir,type){

 if(type==="slash"){
  if(dir==="right") return "up";
  if(dir==="up") return "right";
  if(dir==="left") return "down";
  if(dir==="down") return "left";
 }

 if(type==="back"){
  if(dir==="right") return "down";
  if(dir==="down") return "right";
  if(dir==="left") return "up";
  if(dir==="up") return "left";
 }

 return dir;
}

function traceLaser(){

 let x=source.x;
 let y=source.y;
 let dir=source.dir;

 let pts=[[CELL/2,CELL/2]];
 let success=false;

 for(let i=0;i<200;i++){

  if(dir==="right") x++;
  else if(dir==="left") x--;
  else if(dir==="up") y--;
  else if(dir==="down") y++;

  if(x<0||x>=SIZE||y<0||y>=SIZE) break;

  pts.push([
  x*CELL+CELL/2,
  y*CELL+CELL/2
  ]);

  if(x===target.x && y===target.y){
    success=true;
    break;
  }

  const key=`${x},${y}`;

  if(mirrors[key]){
    dir=reflect(dir,mirrors[key]);
  }
 }

 return {pts,success};
}

function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 particles.forEach(p=>{
 
  p.y-=p.speed;
 
  if(p.y<0){
   p.y=600;
  }
 
  ctx.fillStyle=
   "rgba(255,255,255,.25)";
 
  ctx.beginPath();
 
  ctx.arc(
   p.x,
   p.y,
   p.size,
   0,
   Math.PI*2
  );
 
  ctx.fill();
 
 });
 
 for(let x=0;x<SIZE;x++){
  for(let y=0;y<SIZE;y++){

   ctx.strokeStyle="rgba(255,255,255,.25)";
   ctx.strokeRect(x*CELL,y*CELL,CELL,CELL);

   const key=`${x},${y}`;

   if(mirrors[key]){

    ctx.strokeStyle="white";
    ctx.lineWidth=5;

    ctx.beginPath();

    if(mirrors[key]==="slash"){
      ctx.moveTo(x*CELL+CELL,y*CELL);
      ctx.lineTo(x*CELL,y*CELL+CELL);
    }else{
      ctx.moveTo(x*CELL,y*CELL);
      ctx.lineTo(x*CELL+CELL,y*CELL+CELL);
    }

    ctx.stroke();
   }
  }
 }

 ctx.fillStyle="#22d3ee";
 ctx.beginPath();
 ctx.arc(
  CELL/2,
  CELL/2,
  Math.max(8,CELL*0.18),
  0,
  Math.PI*2
 );
 ctx.fill();

 const orbPulse=
  Math.sin(Date.now()*0.005)*4;
 
 ctx.fillStyle="#facc15";
 
 ctx.beginPath();
 
 ctx.arc(
  target.x*CELL+CELL/2,
  target.y*CELL+CELL/2,
  Math.max(10,CELL*0.22)+orbPulse,
  0,
  Math.PI*2
 );

ctx.fill();

 const laser=traceLaser();

 const pulse=
  4 + Math.sin(Date.now()*0.008)*2;
 
 ctx.strokeStyle="#22d3ee";
 ctx.lineWidth=pulse;
 ctx.beginPath();

 laser.pts.forEach((p,i)=>{
   if(i===0) ctx.moveTo(p[0],p[1]);
   else ctx.lineTo(p[0],p[1]);
 });

 ctx.stroke();

 if(laser.success && !solved){
   solved=true;
   setTimeout(showEvidence,100);
 }
}

function showEvidence(){

 document.getElementById("popupTitle").innerText="Journal Entry Recovered";

 document.getElementById("popupContent").innerText=
  levels[currentLevel].evidence;

 document.getElementById("popup").style.display="block";
}

function closePopup(){

 document.getElementById("popup").style.display="none";

 currentLevel++;

 if(currentLevel<levels.length){
   loadLevel(currentLevel);
 }else{
   document.getElementById("popupTitle").innerText=
     "Journal Fully Restored";

   document.getElementById("popupContent").innerText=
     "All memory fragments recovered.";

   document.getElementById("popup").style.display="block";
 }
}

canvas.addEventListener("click",(e)=>{

 if(solved) return;

 const rect=canvas.getBoundingClientRect();

 const x=Math.floor((e.clientX-rect.left)/CELL);
 const y=Math.floor((e.clientY-rect.top)/CELL);

 const key=`${x},${y}`;

 if(mirrors[key]){
   mirrors[key]=mirrors[key]==="slash"?"back":"slash";
 }
});

function animate(){

 draw();

 requestAnimationFrame(animate);

}
 
loadLevel(0);
animate();
</script>
</body>
</html>
